<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My English Learning Journey — Jhonatan David Caipa Paz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf8f4;
      --warm-white: #f5f2ec;
      --ink: #1a1714;
      --ink-light: #4a4540;
      --ink-muted: #8a8078;
      --accent: #7a5c3a;
      --accent-light: #c4a882;
      --border: #e2dcd3;
      --gold: #b8965a;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.7;
      font-weight: 300;
    }
    header {
      background: var(--ink);
      color: var(--cream);
      padding: 5rem 2rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header-inner { position: relative; z-index: 1; max-width: 680px; margin: auto; }
    .author-photo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      margin: 0 auto 1.5rem;
    }
    /* ... (el resto del CSS se mantiene igual) ... */
    /* Por brevedad aquí, pero copia todo tu CSS original si quieres */
  </style>
</head>
<body>
  <h1>Mi Blog está cargando...</h1>
  <p>Si ves este mensaje, refresca la página en 30 segundos.</p>
</body>
</html>
